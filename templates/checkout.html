<!DOCTYPE html>
<html>
<head>
    <title>Checkout - HomeStyle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
    .checkout-container { max-width: 600px; margin: 60px auto; padding: 40px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 25px; box-shadow: 0 25px 70px rgba(0,0,0,0.2); }
    .checkout-step { display: none; }
    .checkout-step.active { display: block; }
    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; font-size: 16px; }
    .form-group input, .form-group select { width: 100%; padding: 15px 20px; border: 2px solid #e1e5e9; border-radius: 12px; font-size: 16px; transition: all 0.3s; box-sizing: border-box; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #4ecdc4; box-shadow: 0 0 0 3px rgba(78,205,196,0.2); }
    .address-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .full-width { grid-column: 1 / -1; }
    .btn { width: 100%; padding: 20px; background: linear-gradient(45deg, #4ecdc4, #44a08d); color: white; border: none; font-size: 20px; font-weight: bold; border-radius: 15px; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 30px rgba(78,205,196,0.4); text-transform: uppercase; letter-spacing: 1px; }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(78,205,196,0.5); }
    .btn-danger { background: linear-gradient(45deg, #ff6b6b, #ee5a24); box-shadow: 0 10px 30px rgba(255,107,107,0.4); }
    .btn-danger:hover { box-shadow: 0 15px 40px rgba(255,107,107,0.5); }
    .order-summary { background: linear-gradient(135deg, #f8f9fa, #e9ecef); border-radius: 15px; padding: 15px; margin-top: 20px; border-left: 5px solid #4ecdc4; }
    .summary-item { display: flex; justify-content: space-between; margin-bottom: 12px; padding: 10px 0; border-bottom: 1px solid #dee2e6; }
    .summary-total { font-size: 22px; font-weight: bold; color: #e74c3c; }
    .thank-you { text-align: center; padding: 40px; color: #28a745; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="checkout-container">
        <button onclick="history.back()" style="margin-bottom: 20px; padding: 10px 20px; background: #4ecdc4; color: white; border: none; border-radius: 5px; cursor: pointer;">Back</button>
        <div id="checkoutForm" class="checkout-step active">
            <form id="orderForm">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="name" required>
                </div>
                <div class="address-grid">
                    <div class="form-group">
                        <label>Street</label>
                        <input type="text" id="street" required>
                    </div>
                    <div class="form-group">
                        <label>Barangay *</label>
                        <input type="text" id="barangay" required>
                    </div>
                    <div class="form-group">
                        <label>City/Municipality *</label>
                        <input type="text" id="city" required>
                    </div>
                    <div class="form-group">
                        <label>Province *</label>
                        <input type="text" id="province" required>
                    </div>
                    <div class="form-group">
                        <label>Postal Code</label>
                        <input type="text" id="postal">
                    </div>
                </div>
                <div class="form-group">
                    <label>Payment Method *</label>
                    <select id="payment" required>
                        <option value="">Select...</option>
                        <option value="Gcash">Gcash</option>
                        <option value="Credit Card">Credit Card</option>
                        <option value="Cash on Delivery">Cash on Delivery</option>
                    </select>
                </div>
                <button type="button" class="btn" onclick="placeOrder()">Place Order</button>
            </form>
        </div>
        
        <!-- Step 2: Summary -->
        <div id="orderSummary" class="checkout-step">
            <div class="order-summary">
                <h3>Order Summary</h3>
                <div id="summaryItems"></div>
                <div class="summary-item summary-total">
                    <span>Total Amount:</span>
                    <span id="summaryTotal">₱0</span>
                </div>
                <div class="summary-item">
                    <span>Full Address:</span>
                    <span id="summaryAddress"></span>
                </div>
                <div class="summary-item">
                    <span>Payment Method:</span>
                    <span id="summaryPayment"></span>
                </div>
            </div>
            <button type="button" class="btn btn-danger" onclick="confirmOrder()">Confirm & Place Order</button>
        </div>
        
        <!-- Step 3: Thank You -->
<div id="thankYou" class="checkout-step">
            <div class="thank-you" style="max-width: 500px; margin: 0 auto;">
                <h2>Order Confirmed!</h2>
                <p>Thank you for your order!</p>
            </div>
        </div>
    </div>

    <div id="cartData" data-cart="{{ cart | tojson | safe }}"></div>

    <script>
        // Cart from localStorage or session (passed from backend)
        let checkoutCart = {};
        
        // Try localStorage first
        const savedCart = localStorage.getItem('homestyleCart');
        if (savedCart) {
            try {
                checkoutCart = JSON.parse(savedCart);
                console.log('Cart loaded from localStorage:', checkoutCart);
            } catch(e) {
                console.error('Error parsing localStorage cart:', e);
                checkoutCart = {};
            }
        }
        
        // Fallback to template data if localStorage is empty
        if (Object.keys(checkoutCart).length === 0) {
            const cartDataEl = document.getElementById('cartData');
            if (cartDataEl && cartDataEl.getAttribute('data-cart')) {
                try {
                    const cartJson = cartDataEl.getAttribute('data-cart');
                    console.log('Raw cart data from template:', cartJson);
                    if (cartJson && cartJson !== '{}' && cartJson.length > 2) {
                        checkoutCart = JSON.parse(cartJson);
                        console.log('Cart loaded from template:', checkoutCart);
                    }
                } catch(e) {
                    console.error('Cart template initialization error:', e);
                    checkoutCart = {};
                }
            }
        }
        
        if (!checkoutCart || Object.keys(checkoutCart).length === 0) {
            console.warn('Warning: Cart is empty on checkout page');
        }
        
        let orderTotal = 0;
        
        // Default price per item
        const ITEM_PRICE = 300;
        
        function placeOrder() {
            if (Object.keys(checkoutCart).length === 0) {
                alert('Your cart is empty. Please add items before checkout.');
                window.location.href = '/';
                return;
            }
            
            const name = document.getElementById('name').value.trim();
            const street = document.getElementById('street').value.trim();
            const barangay = document.getElementById('barangay').value.trim();
            const city = document.getElementById('city').value.trim();
            const province = document.getElementById('province').value.trim();
            const postal = document.getElementById('postal').value.trim();
            const payment = document.getElementById('payment').value;
            
            if (!name || !street || !barangay || !city || !province || !payment) {
                alert('Please fill all required fields');
                return;
            }
            
            // Calculate total and prepare summary
            orderTotal = 0;
            let summaryHtml = '';
            
            for (let title in checkoutCart) {
                let qty = 1;
                let pricePer = 300;
                
                // Handle both formats: number or {qty, price} object
                if (typeof checkoutCart[title] === 'object' && checkoutCart[title] !== null) {
                    qty = checkoutCart[title].qty || 1;
                    pricePer = checkoutCart[title].price || 300;
                } else {
                    qty = parseInt(checkoutCart[title]) || 1;
                    pricePer = 300;
                }
                
                const lineTotal = qty * pricePer;
                orderTotal += lineTotal;
                summaryHtml += `<div class="summary-item"><span>${title} x${qty}</span><span>₱${lineTotal.toLocaleString()}</span></div>`;
            }
            
            document.getElementById('summaryItems').innerHTML = summaryHtml;
            document.getElementById('summaryTotal').textContent = `₱${orderTotal.toLocaleString()}`;
            document.getElementById('summaryAddress').textContent = [street, barangay, city, province, postal].filter(Boolean).join(', ');
            document.getElementById('summaryPayment').textContent = payment;
            
            document.getElementById('checkoutForm').classList.remove('active');
            document.getElementById('orderSummary').classList.add('active');
        }
        
        function confirmOrder() {
            if (Object.keys(checkoutCart).length === 0) {
                alert('Your cart is empty. Cannot place order.');
                return;
            }
            
            const customer = {
                name: document.getElementById('name').value.trim(),
                street: document.getElementById('street').value.trim(),
                barangay: document.getElementById('barangay').value.trim(),
                city: document.getElementById('city').value.trim(),
                province: document.getElementById('province').value.trim(),
                postal: document.getElementById('postal').value.trim(),
                payment: document.getElementById('payment').value
            };
            
            // Convert cart to simple format {title: qty} for backend
            const simpleCart = {};
            for (let title in checkoutCart) {
                let qty = 1;
                if (typeof checkoutCart[title] === 'object' && checkoutCart[title] !== null) {
                    qty = checkoutCart[title].qty || 1;
                } else {
                    qty = parseInt(checkoutCart[title]) || 1;
                }
                simpleCart[title] = qty;
            }
            
            console.log('Sending to backend:', {cart: simpleCart, customer: customer, total: orderTotal});
            
            fetch('/place-order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({cart: simpleCart, customer: customer, total: orderTotal})
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(data => {
                        throw new Error(data.error || `Server error: ${response.status}`);
                    });
                }
                return response.json();
            })
            .then(data => {
                console.log('Order response:', data);
                if (data.success) {
                    // Clear the cart from localStorage
                    localStorage.removeItem('homestyleCart');
                    // Clear the sessionStorage as backup
                    sessionStorage.removeItem('homestyleCart');
                    document.getElementById('orderSummary').classList.remove('active');
                    document.getElementById('thankYou').classList.add('active');
                    // Redirect to home page after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    alert('Order failed: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(error => {
                console.error('Checkout error:', error);
                alert('An error occurred while placing your order. Please try again.\nError details: ' + error.message);
            });
        }
    </script>
</body>
</html>
