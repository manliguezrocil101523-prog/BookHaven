<div id="cartModal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5);">
  <div style="background: white; margin: 5% auto; padding: 20px; border-radius: 10px; width: 80%; max-width: 600px; max-height: 80vh; overflow-y: auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2>Shopping Cart</h2>
      <span onclick="closeCartModal()" style="font-size: 28px; cursor: pointer;">&times;</span>
    </div>
    <div id="cartContent"></div>
    <div id="cartTotal" style="margin-top: 20px; font-weight: bold; font-size: 20px; text-align: right;"></div>
    <button onclick="checkout()" style="width: 100%; padding: 15px; background: #4CAF50; color: white; border: none; font-size: 18px; border-radius: 5px; margin-top: 20px;">Checkout</button>
  </div>
</div>
