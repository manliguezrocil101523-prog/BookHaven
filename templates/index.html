<!DOCTYPE html>
<html>
<head>
    <title>BookHaven</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <div class="alert" id="alert" style="display: none; padding: 10px; background: green; color: white; border-radius: 5px; text-align: center;"></div>
    <div class="header-section">
      <h1>📚 BookHaven 📚</h1>
    </div>

    <div class="top-bar">
        <input type="text" id="search" placeholder="Search by title or category" style="width: 420px; padding: 15px 20px; font-size: 16px; border: 2px solid rgba(255,255,255,0.8); border-radius: 30px; background: rgba(255,255,255,0.95); box-shadow: 0 6px 20px rgba(0,0,0,0.2); outline: none;">
        <button id="viewCart" onclick="viewCart()" style="padding: 15px 25px; background: linear-gradient(45deg, #ff6b6b, #ee5a24); color: white; border: none; border-radius: 30px; cursor: pointer; font-size: 16px; font-weight: bold; box-shadow: 0 6px 20px rgba(255,107,107,0.4); transition: all 0.3s; min-width: 150px;">🛒 View Cart (<span id="cartCount">0</span>)</button>
    </div>

    <div class="filter-bar">
        <button class="category-filter active" data-category="All">All</button>
        {% for category in categories %}
            <button class="category-filter" data-category="{{ category }}">{{ category }}</button>
        {% endfor %}
    </div>

    <div id="books" class="books-grid">
{% for item in items %}
        <div class="card" data-title="{{ item.title }}" data-price="{{ item.price }}" data-id="{{ item.id or '' }}" data-image="{{ item.image }}">
            <img src="{{ url_for('static', filename=item.image) }}" alt="{{ item.title }}" class="card-image">
            <h3>{{ item.title }}</h3>
            <div class="category-label">{{ item.category }}</div>
            <div class="card-info">
                <div class="price">₱{{ item.price }}</div>
                <div class="qty-section">
                    <label>QTY:</label>
                    <input type="number" class="qty-input" min="1" max="99" value="1" data-title="{{ item.title }}" onchange="updateQty(this.dataset.title, this.value)">
                </div>
            </div>
            <div class="btn-group">
                <button class="btn-cart" onclick="addToCart(this.parentElement.parentElement)" title="Add to Cart">🛒</button>
                <button class="btn-buy" onclick="buyNow(this.parentElement.parentElement)" title="Buy Now">Buy Now</button>
            </div>
            <div class="added-message" style="display: none;">Added to cart!</div>
        </div>
        {% endfor %}
    </div>

    <div id="orderForm" style="display: none;">
        <form method="post" action="/buy">
            <h2>Order: <span id="selectedItem"></span></h2>
            <input type="text" id="name" name="name" placeholder="Your name">
            <input type="text" id="address" name="address" placeholder="Address">
            <input type="hidden" id="itemTitle" name="item">
            <input type="hidden" id="itemPrice" name="price">
            <input type="hidden" id="itemId" name="id">
            <input type="number" id="orderQty" name="quantity" min="1" value="1">
            <button type="submit">Place Order (Cash)</button>
        </form>
    </div>
</div>

<!-- Cart Modal -->
<div id="cartModal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7);">
  <div style="background: white; margin: 5% auto; padding: 25px; border-radius: 15px; width: 90%; max-width: 700px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
      <h2 style="margin: 0; color: #333;">🛒 Shopping Cart</h2>
      <span onclick="closeCartModal()" style="font-size: 30px; cursor: pointer; color: #999;">×</span>
    </div>
    <div id="cartContent"></div>
    <div id="cartTotal" style="margin-top: 25px; padding-top: 20px; border-top: 2px solid #eee; font-size: 24px; font-weight: bold; text-align: right; color: #333;"></div>
    <button onclick="checkout()" style="width: 100%; padding: 18px; background: linear-gradient(45deg, #4CAF50, #45a049); color: white; border: none; font-size: 20px; font-weight: bold; border-radius: 10px; margin-top: 20px; cursor: pointer;">Proceed to Checkout</button>
  </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
